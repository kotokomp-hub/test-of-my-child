<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naji Sparks Clicker</title>
    <script src="https://cdn.jsdelivr.net/gh/najicreator/NMASDK@main/nmasdk.js"></script>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .balance { font-size: 24px; margin: 20px; color: #00ff88; }
        #player { 
            width: 80px; height: 80px; margin: 50px auto; 
            background: #555; border-radius: 15px; 
            transition: 0.1s; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 40px;
        }
        #player:active { transform: scale(0.9); }
        .shop { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        .skin-btn { 
            padding: 10px; background: #333; border: 1px solid #555; 
            color: white; cursor: pointer; border-radius: 8px;
        }
        .skin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .price { display: block; font-size: 12px; color: #ffd700; }
    </style>
</head>
<body>

    <div class="balance">Баланс: <span id="sparks">100</span> ✨</div>
    
    <div id="player" onclick="clickPlayer()">👤</div>
    <p>Нажми на персонажа!</p>

    <div class="shop">
        <button class="skin-btn" onclick="buySkin('🔥', 50)">
            Скин Огонь <span class="price">50 Sparks</span>
        </button>
        <button class="skin-btn" onclick="buySkin('🧊', 80)">
            Скин Лед <span class="price">80 Sparks</span>
        </button>
    </div>

    <script>
        const sdk = new NMASDK();
        let sparks = 100;

        function updateUI() {
            document.getElementById('sparks').innerText = sparks;
        }

        function clickPlayer() {
            // Вибрация через SDK
            sdk.haptic('impact', 'light');
            sparks += 1;
            updateUI();
        }

        function buySkin(emoji, cost) {
            if (sparks >= cost) {
                sparks -= cost;
                document.getElementById('player').innerText = emoji;
                updateUI();

                // ОТПРАВКА ДАННЫХ В ПЛАТФОРМУ
                // Мы уведомляем систему, что потратили валюту и сменили скин
                sdk.sendData(JSON.stringify({
                    event: "skin_purchase",
                    skin: emoji,
                    remaining_sparks: sparks
                }));

                sdk.haptic('notification', 'success');
            } else {
                // Если не хватает, просим платформу расширить окно (для доната?)
                sdk.expand();
                alert("Недостаточно NajiSparks!");
            }
        }

        // Сообщаем платформе, что игра загрузилась
        sdk.ready();
    </script>
</body>
</html>
