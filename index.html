<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NMA SDK Game</title>
    <script src="https://cdn.jsdelivr.net/gh/najicreator/NMASDK@main/nmasdk.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 300px; height: 400px; border: 2px solid #16213e; background: #0f3460; border-radius: 10px; overflow: hidden; }
        .particle { position: absolute; width: 20px; height: 20px; background: #e94560; border-radius: 50%; cursor: pointer; }
        #stats { margin-bottom: 10px; font-size: 1.2rem; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; background: #0f3460; color: white; }
    </style>
</head>
<body>

    <div id="stats">Энергия: <span id="score">0</span></div>
    
    <div id="game-container" id="area"></div>

    <div class="controls">
        <button onclick="requestExpand()">Развернуть</button>
        <button onclick="sendResult()">Отправить результат</button>
        <button onclick="closeGame()" style="background: #e94560;">Выйти</button>
    </div>

    <script>
        // Инициализируем NMASDK
        const nma = new NMASDK();
        
        let score = 0;
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');

        // 1. Используем nma.ready() при запуске
        nma.ready();

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 280 + 'px';
            p.style.top = Math.random() * 380 + 'px';
            
            p.onclick = () => {
                score++;
                scoreEl.innerText = score;
                p.remove();
                
                // 2. Вызываем вибрацию через SDK при клике
                nma.haptic('impact', 'medium');
                
                createParticle();
            };
            container.appendChild(p);
        }

        // Функции взаимодействия с SDK
        function requestExpand() {
            // 3. Просим платформу расширить окно
            nma.expand();
        }

        function sendResult() {
            // 4. Отправляем данные платформе
            const data = { score: score, timestamp: Date.now() };
            nma.sendData(JSON.stringify(data));
            alert("Данные отправлены родительскому окну!");
        }

        function closeGame() {
            // 5. Просим закрыть игру
            nma.close();
        }

        // Начинаем
        createParticle();
        createParticle();
    </script>
</body>
</html>
